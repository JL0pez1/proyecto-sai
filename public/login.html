<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAI - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Sistema SAI</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="ejemplo@sai.com" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
                <p id="errorMensaje" style="color: red; margin-top: 10px; text-align: center; display: none;"></p>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
